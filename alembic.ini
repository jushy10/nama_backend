# Alembic configuration.
#
# The database URL is intentionally NOT set here — migrations/env.py reads it
# from the DATABASE_URL environment variable (the same value the app uses), so
# credentials never live in a committed file.

[alembic]
script_location = migrations
prepend_sys_path = .
# Use a date-prefixed slug for new revision files, e.g. 20260620_1430_add_x.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
