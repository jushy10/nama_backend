# Alembic configuration.
#
# The database URL is resolved at run time from the DATABASE_URL environment
# variable in alembic/env.py — the same variable the app uses — so it is left
# blank here on purpose (don't put a real URL in the repo).

[alembic]
script_location = alembic
prepend_sys_path = .
# Split path lists (prepend_sys_path) on the OS separator rather than the legacy
# space/comma/colon — silences an Alembic deprecation warning.
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
