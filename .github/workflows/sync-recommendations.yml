name: Sync recommendations
run-name: Sync recommendations

# Daily (and on-demand). Analyst recommendation trends are monthly snapshots, but the *current*
# month's counts drift as analysts issue upgrades/downgrades — and the read cache serves stored
# rows at any age (no TTL), so freshness rides entirely on this run. Daily keeps the current
# month at most a day stale, and it's cheap: one Yahoo call per stock.
#
# It launches a one-off ECS Fargate task that runs `python -m app.sync recommendations <limit>`
# (the SyncRecommendations use case) to completion and exits. The sweep runs on its OWN 2 GB
# task definition (nama-dev-sync), OFF the always-on API task, so it can't OOM the small
# service — this replaced POSTing the app's /internal/recommendations/sync endpoint. The task
# reaches the private RDS by borrowing the app service's own network config.
#
# FIRE-AND-FORGET: this workflow LAUNCHES the task and returns; the sweep then runs in the
# background on ECS (it can take several minutes) and its result — "recommendations sync done:
# refreshed=… failed=…" — lands in the task's CloudWatch logs, not here. A green run means the
# task launched; check CloudWatch for the outcome. yfinance (Yahoo) needs no API key but blocks
# data-centre IPs intermittently; an empty result from Yahoo is never stored, so a transient
# block leaves the cached months intact.
#
# Manual run: Actions → "Sync recommendations" → Run workflow (same trigger, off-schedule).
#
# Auth: the AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY secrets + AWS_REGION var — the same
# identity the deploy + migrate jobs already use to run one-off ECS tasks.

on:
  workflow_dispatch: {}
  # Daily, 07:30 UTC — before the market opens, and staggered off the weekly earnings syncs
  # (Mondays 08:00/09:00) so the app isn't hammering Yahoo from the same host at once. Exact
  # timing doesn't matter. Caveats: scheduled workflows run only from the default branch, and
  # GitHub auto-disables the schedule after 60 days with no repo activity.
  schedule:
    - cron: "30 7 * * *"

concurrency:
  group: sync-recommendations
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  # These match module "app" { name = "nama-dev" } in infra/environments/dev; the sync task
  # def is that name + "-sync" (aws_ecs_task_definition.sync in the ecs-fargate-service module).
  ECS_CLUSTER: nama-dev
  ECS_SERVICE: nama-dev
  SYNC_TASK_DEF: nama-dev-sync
  SYNC_SLICE: recommendations
  # Max stored stocks the sweep refreshes this run, stalest first (a universe larger than this
  # is covered over successive runs).
  SYNC_LIMIT: "1000"

jobs:
  sync:
    name: Sync recommendations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Launch the sync task
        run: |
          set -euo pipefail

          # The sync task runs INSIDE the VPC (the private RDS is unreachable from the runner).
          # Borrow the app service's own network config — subnets + security groups, including
          # the DB SG — so there's nothing to hardcode. Same approach the migrate job uses.
          status=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$status" != "ACTIVE" ]; then
            echo "::error::ECS service '$ECS_SERVICE' is not ACTIVE (status: $status) — deploy the app first."
            exit 1
          fi
          netcfg=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].networkConfiguration' --output json)

          # Container command override: python -m app.sync <slice> [limit].
          overrides=$(jq -cn --arg slice "$SYNC_SLICE" --arg limit "${SYNC_LIMIT:-}" '
            {containerOverrides: [{
              name: "app",
              command: (["python", "-m", "app.sync", $slice] + (if $limit == "" then [] else [$limit] end))
            }]}')

          echo "Launching one-off sync task: app.sync $SYNC_SLICE ${SYNC_LIMIT:-}"
          run=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$SYNC_TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "$netcfg" \
            --started-by "gha-sync-${GITHUB_SHA::7}" \
            --overrides "$overrides")

          # run-task exits 0 even when it places no task (capacity/throttle land in .failures),
          # so check explicitly — this is what makes a green run mean "the task launched".
          task_arn=$(echo "$run" | jq -r '.tasks[0].taskArn // empty')
          if [ -z "$task_arn" ]; then
            echo "::error::run-task launched no task: $(echo "$run" | jq -c '.failures')"
            exit 1
          fi

          echo "Launched $task_arn"
          echo "Fire-and-forget: the sweep runs on ECS (it can take several minutes); its result —"
          echo "\"$SYNC_SLICE sync done: refreshed=… failed=…\" — lands in the task's CloudWatch logs."
