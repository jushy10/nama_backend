name: Sync recommendations
run-name: Sync recommendations

# Daily (and on-demand). Analyst recommendation trends are monthly snapshots, but the
# *current* month's counts drift as analysts issue upgrades/downgrades — and the read
# cache serves stored rows at any age (no TTL), so freshness rides entirely on this run.
# Daily keeps the current month at most a day stale, and it's cheap: one Yahoo call per
# stock. It POSTs the deployed app's recommendations cron endpoint
# (app/stocks/endpoints/cron_recommendations_endpoints.py), which runs the
# SyncRecommendations use case and refreshes the stalest stocks up to
# SYNC_RECOMMENDATIONS_LIMIT, keeping the sequential Yahoo calls gentle on its rate
# limits.
#
# Two operational notes:
#  - The live source is yfinance (Yahoo), which needs no API key — so the serving task
#    carries no credential. Yahoo does rate-limit / block data-centre IPs, so a run may
#    serve fewer rows than the limit; that's fine, the next run retries the stalest first.
#    An empty result from Yahoo is never stored, so a transient block leaves the cached
#    months intact.
#  - The endpoint is unauthenticated, so it must not be reachable from the public
#    internet. This workflow just triggers it; it relies on network isolation for safety.
#
# Requires the repo/environment variable API_BASE_URL — the deployed app's base URL,
# reachable from the GitHub runner.

on:
  workflow_dispatch: {}
  # Daily, 07:30 UTC — before the market opens, and staggered off the weekly earnings
  # syncs (Mondays 08:00/09:00) so the app isn't hammering Yahoo from the same host at
  # once. Exact timing doesn't matter, so GitHub delaying scheduled runs under load is
  # fine. Caveats: scheduled workflows run only from the default branch, and GitHub
  # auto-disables the schedule after 60 days with no repo activity.
  schedule:
    - cron: "30 7 * * *"

concurrency:
  group: sync-recommendations
  cancel-in-progress: false

env:
  # Max stored stocks to refresh per run; kept modest so the sequential Yahoo calls stay
  # gentle on its rate limits.
  SYNC_RECOMMENDATIONS_LIMIT: "200"

jobs:
  sync:
    name: Sync recommendations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger the recommendations refresh
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          set -euo pipefail

          if [ -z "${API_BASE_URL:-}" ]; then
            echo "::error::API_BASE_URL is not set — add it as a repo/environment variable pointing at the deployed app."
            exit 1
          fi

          url="${API_BASE_URL%/}/internal/recommendations/sync?limit=${SYNC_RECOMMENDATIONS_LIMIT}"
          echo "POST $url"

          # Capture the body and status separately. The refresh runs synchronously and
          # can make a few hundred sequential Yahoo calls, so allow a generous timeout.
          http_code=$(curl -sS -X POST "$url" \
            --max-time 900 \
            -o /tmp/sync_recommendations_response.json \
            -w '%{http_code}')

          echo "HTTP $http_code"
          cat /tmp/sync_recommendations_response.json 2>/dev/null || true
          echo

          if [ "$http_code" != "200" ]; then
            echo "::error::Recommendations sync failed (HTTP $http_code) — check the app logs."
            exit 1
          fi
          echo "Recommendations synced."
