name: LLM evals
run-name: LLM evals · ${{ github.ref_name }}

# The metered DeepEval suite (tests_llm/): boots this branch's server against a seeded
# SQLite DB and grades the live research agent's answers with a Bedrock judge. Costs real
# Bedrock tokens (~$0.50/run), so it runs on demand and weekly — never per-PR.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1" # Mondays 12:00 UTC

concurrency:
  group: llm-evals-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  deepeval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the app with the eval extras
        run: pip install -e ".[dev,bedrock,llm-evals]"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Migrate and seed the eval database
        env:
          DATABASE_URL: sqlite:///./eval.db
        run: |
          alembic upgrade head
          python tests_llm/seed_eval_db.py

      - name: Start the server
        env:
          DATABASE_URL: sqlite:///./eval.db
          BEDROCK_REGION: ${{ env.AWS_REGION }}
        run: |
          uvicorn app.main:app --port 8080 --log-level warning &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/healthz && break
            sleep 1
          done

      - name: Run the DeepEval suite
        env:
          RESEARCH_AGENT_URL: http://localhost:8080
          BEDROCK_REGION: ${{ env.AWS_REGION }}
          DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
        run: pytest tests_llm -p no:cacheprovider
