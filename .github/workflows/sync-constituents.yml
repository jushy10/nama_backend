name: Sync screener constituents
run-name: Sync constituents

# Weekly (and on-demand). The S&P 500 / Nasdaq-100 universe changes only on
# reconstitution (~quarterly), so this isn't part of every deploy — a weekly
# refresh keeps the table from drifting without anyone remembering to run it. It
# runs scripts/sync_constituents.py as a one-off ECS task — inside the VPC, where
# it can reach the private RDS — on the latest deployed image.
#
# The app task injects DATABASE_URL but NOT the FMP key (that's build/ops-time
# only, deliberately kept out of the runtime task). So this workflow reads the
# key from SSM and passes it to the task as an environment override.

on:
  workflow_dispatch: {}
  # Mondays 08:00 UTC. Weekly is plenty for a ~quarterly universe; exact timing
  # doesn't matter, so GitHub delaying scheduled runs under load is fine. Caveats:
  # scheduled workflows run only from the default branch, and GitHub auto-disables
  # the schedule after 60 days with no repo activity.
  schedule:
    - cron: "0 8 * * 1"

concurrency:
  group: sync-constituents
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  # Match module "app" { name = "nama-dev" } in environments/dev.
  ECS_CLUSTER: nama-dev
  ECS_SERVICE: nama-dev
  FMP_SSM_PARAM: /nama/dev/fmp-api-key

jobs:
  sync:
    name: Sync constituents
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run the constituents sync as a one-off ECS task
        run: |
          set -euo pipefail

          status=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$status" != "ACTIVE" ]; then
            echo "::error::ECS service '$ECS_SERVICE' is not ACTIVE ($status) — deploy the app first."
            exit 1
          fi

          fmp_key=$(aws ssm get-parameter --name "$FMP_SSM_PARAM" --with-decryption \
            --query 'Parameter.Value' --output text)
          echo "::add-mask::$fmp_key"
          if [ -z "$fmp_key" ] || [ "$fmp_key" = "REPLACE_ME_VIA_PUT_PARAMETER" ]; then
            echo "::error::$FMP_SSM_PARAM is unset or still the placeholder — put the real FMP key in SSM first."
            exit 1
          fi

          netcfg=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].networkConfiguration' --output json)

          # Build the override with jq so the key is injected safely (no shell
          # interpolation into the JSON).
          overrides=$(jq -nc --arg key "$fmp_key" '{
            containerOverrides: [{
              name: "app",
              command: ["python", "scripts/sync_constituents.py"],
              environment: [{ name: "FMP_API_KEY", value: $key }]
            }]
          }')

          echo "Starting constituents sync task…"
          task_arn=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$ECS_SERVICE" \
            --launch-type FARGATE \
            --network-configuration "$netcfg" \
            --started-by "gha-sync-${GITHUB_SHA::7}" \
            --overrides "$overrides" \
            --query 'tasks[0].taskArn' --output text)
          echo "Task: $task_arn"

          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$task_arn"

          exit_code=$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$task_arn" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          reason=$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$task_arn" \
            --query 'tasks[0].stoppedReason' --output text)
          echo "Sync task stopped (exitCode=$exit_code, reason=$reason)"
          if [ "$exit_code" != "0" ]; then
            echo "::error::Constituents sync failed — check the task's CloudWatch logs."
            exit 1
          fi
          echo "Constituents synced."
