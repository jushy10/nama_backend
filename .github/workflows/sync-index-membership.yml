name: Sync index membership
run-name: Sync index membership

# Weekly (and on-demand). Reconciles which stocks are in the S&P 500 / Nasdaq-100 onto the
# stocks anchor's in_sp500 / in_nasdaq100 flags. Membership only changes on the quarterly index
# rebalances, so weekly is more than enough.
#
# It launches a one-off ECS Fargate task that runs `python -m app.sync index-membership` (the
# SyncIndexMembership use case) to completion and exits. The use case reads both rosters from
# Wikipedia (the S&P 500 + Nasdaq-100 constituents tables — keyless), then marks current members
# and clears drop-outs on the anchor. It runs on its OWN task definition (nama-dev-sync), OFF the
# always-on API task, the same as the other sync sweeps — this replaced POSTing the app's
# /internal/index-membership/sync endpoint. The task reaches the private RDS by borrowing the app
# service's own network config.
#
# There is no `limit`: the reconcile always processes the whole membership set (a full mark/clear
# against both index lists), so the command takes no cap argument.
#
# FIRE-AND-FORGET: this workflow LAUNCHES the task and returns; the sweep then runs in the
# background on ECS and its result — "index-membership sync done: sp500 members=… marked=…
# cleared=… …" — lands in the task's CloudWatch logs, not here. A green run means the task
# launched; check CloudWatch for the outcome.
#
# Source notes:
#  - Wikipedia is keyless (this replaced Finnhub's /index/constituents, which is a paid capability
#    the deployed key 403'd on). It welcomes programmatic reads from data-centre IPs, so it works
#    from Fargate where the Yahoo/Nasdaq/ETF-issuer endpoints block us.
#  - Each index page is fetched independently; a page that fails or comes back with an unparseable
#    roster is skipped server-side (its flags are left as-is), so a bad response delays new data
#    but never clears a live index.
#
# Manual run: Actions → "Sync index membership" → Run workflow (same trigger, off-schedule).
#
# Auth: the AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY secrets + AWS_REGION var — the same
# identity the deploy + migrate jobs already use to run one-off ECS tasks.

on:
  workflow_dispatch: {}
  # Weekly, Sundays 06:30 UTC — just after the weekly universe sync (06:00) and staggered off the
  # daily recommendations sync (07:30) and the Monday earnings syncs (08:00/09:00). Exact timing
  # doesn't matter, so GitHub delaying scheduled runs under load is fine. Caveats: scheduled
  # workflows run only from the default branch, and GitHub auto-disables the schedule after 60
  # days with no repo activity.
  schedule:
    - cron: "30 6 * * 0"

concurrency:
  group: sync-index-membership
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  # These match module "app" { name = "nama-dev" } in infra/environments/dev; the sync task
  # def is that name + "-sync" (aws_ecs_task_definition.sync in the ecs-fargate-service module).
  ECS_CLUSTER: nama-dev
  ECS_SERVICE: nama-dev
  SYNC_TASK_DEF: nama-dev-sync
  SYNC_SLICE: index-membership

jobs:
  sync:
    name: Sync index membership
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Launch the sync task
        run: |
          set -euo pipefail

          # The sync task runs INSIDE the VPC (the private RDS is unreachable from the runner).
          # Borrow the app service's own network config — subnets + security groups, including
          # the DB SG — so there's nothing to hardcode. Same approach the migrate job uses.
          status=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$status" != "ACTIVE" ]; then
            echo "::error::ECS service '$ECS_SERVICE' is not ACTIVE (status: $status) — deploy the app first."
            exit 1
          fi
          netcfg=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].networkConfiguration' --output json)

          # Container command override: python -m app.sync index-membership (no limit — the
          # reconcile always processes the whole membership set).
          overrides=$(jq -cn --arg slice "$SYNC_SLICE" '
            {containerOverrides: [{
              name: "app",
              command: ["python", "-m", "app.sync", $slice]
            }]}')

          echo "Launching one-off sync task: app.sync $SYNC_SLICE"
          run=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$SYNC_TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "$netcfg" \
            --started-by "gha-sync-${GITHUB_SHA::7}" \
            --overrides "$overrides")

          # run-task exits 0 even when it places no task (capacity/throttle land in .failures),
          # so check explicitly — this is what makes a green run mean "the task launched".
          task_arn=$(echo "$run" | jq -r '.tasks[0].taskArn // empty')
          if [ -z "$task_arn" ]; then
            echo "::error::run-task launched no task: $(echo "$run" | jq -c '.failures')"
            exit 1
          fi

          echo "Launched $task_arn"
          echo "Fire-and-forget: the sweep runs on ECS; its result —"
          echo "\"index-membership sync done: sp500 members=… marked=… cleared=… …\" — lands in CloudWatch."
