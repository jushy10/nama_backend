name: Sync revenue segments
run-name: Sync revenue segments

# Monthly (and on-demand). A company's revenue disaggregation — its revenue by operating
# segment, product line, and geography — changes about once a year, when it files a new 10-K, so
# a monthly refresh keeps the store current with plenty of margin. The sweep both keeps the
# already-stored rows fresh and SEEDS stocks not yet cached (the ≥$1B universe), un-cached first.
#
# It launches a one-off ECS Fargate task that runs `python -m app.sync revenue-segments [limit]`
# (the SyncRevenueSegments use case) to completion and exits. The sweep runs on its OWN 1 GB task
# definition (nama-dev-sync), OFF the always-on API task, so it can't OOM the small service. The
# task reaches the private RDS by borrowing the app service's own network config.
#
# Source is SEC EDGAR (keyless, public government open data). Unlike the Yahoo syncs there is NO
# per-IP block to pace around — EDGAR welcomes data-centre reads; its only ask is a descriptive
# User-Agent (baked into the adapter) and staying under ~10 requests/second, which the SERIAL
# sweep plus the adapter's own request spacing (SecEdgarRevenueSegmentsProvider's
# min_request_interval, set in the cron runner) both respect. So there's no YF_MIN_REQUEST_INTERVAL_MS
# knob here — the pacing lives in the adapter, not an env var.
#
# By default the sweep processes EVERY stock in the anchor (un-cached first, then stalest); use
# the optional `limit` dispatch input to cap a single run (e.g. to chunk the first seed).
#
# FIRE-AND-FORGET: this workflow LAUNCHES the task and returns; the sweep then runs in the
# background on ECS (it can take several minutes) and its result — "revenue-segments sync done:
# refreshed=… failed=…" — lands in the task's CloudWatch logs, not here. A green run means the
# task launched; check CloudWatch for the outcome. A degraded fetch (a transient SEC failure or a
# filer we can't map) is skipped and left for the next run; a company with no disaggregation is a
# clean empty result, never an error, and the merge-preserving upsert never erases stored history.
#
# Manual run: Actions → "Sync revenue segments" → Run workflow (same trigger, off-schedule).
#
# Auth: the AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY secrets + AWS_REGION var — the same identity
# the deploy + migrate jobs already use to run one-off ECS tasks.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional cap on stocks to refresh this run (un-cached first, then stalest). Leave blank to process every stock."
        required: false
        type: string
        default: ""
  # 3rd of each month, 09:00 UTC — a couple of days after the earnings syncs (1st) so the monthly
  # batch tasks don't all land on the same host at once. The stored segment rows change about once
  # a year per stock, so a monthly refresh keeps them current; exact timing doesn't matter.
  # Caveats: scheduled workflows run only from the default branch, and GitHub auto-disables the
  # schedule after 60 days with no repo activity.
  schedule:
    - cron: "0 9 3 * *"

concurrency:
  group: sync-revenue-segments
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  # These match module "app" { name = "nama-dev" } in infra/environments/dev; the sync task def
  # is that name + "-sync" (aws_ecs_task_definition.sync in the ecs-fargate-service module).
  ECS_CLUSTER: nama-dev
  ECS_SERVICE: nama-dev
  SYNC_TASK_DEF: nama-dev-sync
  SYNC_SLICE: revenue-segments

jobs:
  sync:
    name: Sync revenue segments
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Launch the sync task
        env:
          # Optional per-dispatch cap; empty on scheduled runs (and by default), so the sweep
          # processes every stock.
          SYNC_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          set -euo pipefail

          # The sync task runs INSIDE the VPC (the private RDS is unreachable from the runner).
          # Borrow the app service's own network config — subnets + security groups, including the
          # DB SG — so there's nothing to hardcode. Same approach the migrate job uses.
          status=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$status" != "ACTIVE" ]; then
            echo "::error::ECS service '$ECS_SERVICE' is not ACTIVE (status: $status) — deploy the app first."
            exit 1
          fi
          netcfg=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].networkConfiguration' --output json)

          # Container override: python -m app.sync <slice> [limit] (an empty limit — scheduled
          # runs — omits the arg, so the sweep processes every stock). No env overrides: SEC
          # pacing lives in the adapter, not an env var.
          overrides=$(jq -cn --arg slice "$SYNC_SLICE" --arg limit "${SYNC_LIMIT:-}" '
            {containerOverrides: [{
              name: "app",
              command: (["python", "-m", "app.sync", $slice] + (if $limit == "" then [] else [$limit] end))
            }]}')

          echo "Launching one-off sync task: app.sync $SYNC_SLICE ${SYNC_LIMIT:-(no limit)}"
          run=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$SYNC_TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "$netcfg" \
            --started-by "gha-sync-${GITHUB_SHA::7}" \
            --overrides "$overrides")

          # run-task exits 0 even when it places no task (capacity/throttle land in .failures), so
          # check explicitly — this is what makes a green run mean "the task launched".
          task_arn=$(echo "$run" | jq -r '.tasks[0].taskArn // empty')
          if [ -z "$task_arn" ]; then
            echo "::error::run-task launched no task: $(echo "$run" | jq -c '.failures')"
            exit 1
          fi

          echo "Launched $task_arn"
          echo "Fire-and-forget: the sweep runs on ECS (it can take several minutes); its result —"
          echo "\"$SYNC_SLICE sync done: refreshed=… failed=…\" — lands in the task's CloudWatch logs."
