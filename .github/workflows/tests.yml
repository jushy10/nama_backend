name: Tests
run-name: Tests · ${{ github.ref_name }}

# The offline pytest suite: the PR check, and (via workflow_call) the gate on app-image.yml's deploy.
# No `paths:` filter — it's a required check, and a required check that never runs never reports.

on:
  pull_request:
  workflow_call:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job id = the required status-check name on main; renaming it means updating branch protection.
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # Match the runtime image (Dockerfile: python:3.12-slim).
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      # Dev extra only — the suite drives fakes, so the postgres/bedrock SDKs stay out of CI.
      - name: Install the app and test dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest
