name: Sync quarterly earnings
run-name: Sync quarterly earnings

# Weekly (and on-demand). Reported quarters and upcoming report dates change through
# earnings season, and the read endpoint fills new symbols lazily, so this just keeps the
# already-stored rows fresh. It POSTs the deployed app's quarterly-earnings cron endpoint
# (app/stocks/endpoints/cron_quarterly_earnings_endpoints.py), which runs the
# SyncQuarterlyEarnings use case, refreshing the stalest stocks first.
#
# The refresh runs in SMALL BATCHES rather than one big call: the endpoint is synchronous
# and the API Gateway in front of the app has a HARD 30s integration timeout, so a
# hundreds-of-symbols request would 504 at the gateway while the app kept working. Each
# batch refreshes a few stocks (well under the timeout); refreshed stocks get a new fetch
# stamp, so consecutive stalest-first batches naturally walk the whole stored set. The loop
# stops early when a batch refreshes nothing (Yahoo blocking the runs) or comes back
# smaller than requested (stored set exhausted).
#
# Operational notes:
#  - The live source is yfinance (Yahoo), which needs no API key. Yahoo rate-limits / blocks
#    data-centre IPs intermittently, so a run may refresh fewer stocks than the limit; the
#    next run retries the stalest first. A degraded fetch can't erase stored figures: the
#    sync merges the fresh window with the stored rows (revenue actuals and quarters Yahoo
#    drops are carried forward), and an empty result is never stored.
#  - The endpoint is currently unauthenticated (an auth-token guard is planned); this
#    workflow just triggers it.
#
# Requires the repo/environment variable API_BASE_URL — the deployed app's base URL,
# reachable from the GitHub runner.

on:
  workflow_dispatch: {}
  # Mondays, 08:00 UTC. Weekly keeps report dates and freshly-reported quarters current;
  # exact timing doesn't matter, so GitHub delaying scheduled runs under load is fine.
  # Caveats: scheduled workflows run only from the default branch, and GitHub
  # auto-disables the schedule after 60 days with no repo activity.
  schedule:
    - cron: "0 8 * * 1"

concurrency:
  group: sync-quarterly-earnings
  cancel-in-progress: false

env:
  # Max stored stocks to refresh per run, and how many per HTTP call. Each batch must finish
  # inside API Gateway's hard 30s integration timeout (a stock is ~4 sequential Yahoo
  # calls), so keep the batch small; the loop covers the rest.
  SYNC_QUARTERLY_EARNINGS_LIMIT: "200"
  SYNC_QUARTERLY_EARNINGS_BATCH: "5"

jobs:
  sync:
    name: Sync quarterly earnings
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger the quarterly-earnings refresh (batched)
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          set -euo pipefail

          if [ -z "${API_BASE_URL:-}" ]; then
            echo "::error::API_BASE_URL is not set — add it as a repo/environment variable pointing at the deployed app."
            exit 1
          fi

          total="${SYNC_QUARTERLY_EARNINGS_LIMIT}"
          batch="${SYNC_QUARTERLY_EARNINGS_BATCH}"
          url="${API_BASE_URL%/}/internal/earnings/quarterly/sync?limit=${batch}"
          refreshed_total=0
          failed_total=0
          done_count=0

          while [ "$done_count" -lt "$total" ]; do
            http_code=$(curl -sS -X POST "$url" \
              --max-time 120 \
              -o /tmp/sync_response.json \
              -w '%{http_code}')
            body=$(cat /tmp/sync_response.json 2>/dev/null || echo '{}')
            echo "POST limit=${batch} -> HTTP ${http_code}: ${body}"

            if [ "$http_code" != "200" ]; then
              echo "::error::Quarterly-earnings sync batch failed (HTTP $http_code) — check the app logs."
              exit 1
            fi

            refreshed=$(echo "$body" | jq -r '.refreshed // 0')
            failed=$(echo "$body" | jq -r '.failed // 0')
            refreshed_total=$((refreshed_total + refreshed))
            failed_total=$((failed_total + failed))
            done_count=$((done_count + refreshed + failed))

            # Nothing refreshed: either no stored stocks or Yahoo is blocking every fetch —
            # more batches won't help this run.
            if [ "$refreshed" -eq 0 ]; then
              echo "No stocks refreshed in this batch — stopping early."
              break
            fi
            # A short batch means the stored set is smaller than the request — done.
            if [ $((refreshed + failed)) -lt "$batch" ]; then
              echo "Stored set exhausted — stopping."
              break
            fi
          done

          echo "Quarterly earnings synced: refreshed=${refreshed_total} failed=${failed_total}."
          if [ "$refreshed_total" -eq 0 ] && [ "$failed_total" -gt 0 ]; then
            echo "::error::Every attempted stock failed this run (Yahoo blocked?) — stored rows keep serving; the next run retries."
            exit 1
          fi
