name: Sync quarterly earnings
run-name: Sync quarterly earnings

# Weekly (and on-demand). Refreshes the stalest stored quarterly-earnings rows. Reported
# quarters and upcoming report dates change through earnings season, and the read endpoint
# fills new symbols lazily, so this just keeps the already-stored rows fresh.
#
# It launches a one-off ECS Fargate task that runs `python -m app.sync quarterly-earnings
# <limit>` (the SyncQuarterlyEarnings use case) to completion and exits. The sweep runs on its
# OWN 2 GB task definition (nama-dev-sync), OFF the always-on API task, so a heavy sweep can't
# OOM the small service — this replaced POSTing the app's /internal/earnings/quarterly/sync
# endpoint (which ran the sweep inside the API task). The task reaches the private RDS by
# borrowing the app service's own network config.
#
# FIRE-AND-FORGET: this workflow LAUNCHES the task and returns; the sweep then runs in the
# background on ECS (it can take several minutes) and its result — "quarterly-earnings sync
# done: refreshed=… failed=…" — lands in the task's CloudWatch logs, not here. A green run
# means the task launched; check CloudWatch for the outcome. yfinance (Yahoo) needs no API
# key but blocks data-centre IPs intermittently; a degraded fetch can't erase stored figures
# (the sync merges the fresh window with stored rows) and an empty result is never stored.
#
# Manual run: Actions → "Sync quarterly earnings" → Run workflow (same trigger, off-schedule).
#
# Auth: the AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY secrets + AWS_REGION var — the same
# identity the deploy + migrate jobs already use to run one-off ECS tasks.

on:
  workflow_dispatch: {}
  # Mondays, 08:00 UTC. Weekly keeps report dates and freshly-reported quarters current; exact
  # timing doesn't matter, so GitHub delaying scheduled runs under load is fine. Caveats:
  # scheduled workflows run only from the default branch, and GitHub auto-disables the schedule
  # after 60 days with no repo activity.
  schedule:
    - cron: "0 8 * * 1"

concurrency:
  group: sync-quarterly-earnings
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  # These match module "app" { name = "nama-dev" } in infra/environments/dev; the sync task
  # def is that name + "-sync" (aws_ecs_task_definition.sync in the ecs-fargate-service module).
  ECS_CLUSTER: nama-dev
  ECS_SERVICE: nama-dev
  SYNC_TASK_DEF: nama-dev-sync
  SYNC_SLICE: quarterly-earnings
  # Max stored stocks the sweep refreshes this run, stalest first (a universe larger than this
  # is covered over successive runs).
  SYNC_LIMIT: "1000"

jobs:
  sync:
    name: Sync quarterly earnings
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Launch the sync task
        run: |
          set -euo pipefail

          # The sync task runs INSIDE the VPC (the private RDS is unreachable from the runner).
          # Borrow the app service's own network config — subnets + security groups, including
          # the DB SG — so there's nothing to hardcode. Same approach the migrate job uses.
          status=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$status" != "ACTIVE" ]; then
            echo "::error::ECS service '$ECS_SERVICE' is not ACTIVE (status: $status) — deploy the app first."
            exit 1
          fi
          netcfg=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].networkConfiguration' --output json)

          # Container command override: python -m app.sync <slice> [limit].
          overrides=$(jq -cn --arg slice "$SYNC_SLICE" --arg limit "${SYNC_LIMIT:-}" '
            {containerOverrides: [{
              name: "app",
              command: (["python", "-m", "app.sync", $slice] + (if $limit == "" then [] else [$limit] end))
            }]}')

          echo "Launching one-off sync task: app.sync $SYNC_SLICE ${SYNC_LIMIT:-}"
          run=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$SYNC_TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "$netcfg" \
            --started-by "gha-sync-${GITHUB_SHA::7}" \
            --overrides "$overrides")

          # run-task exits 0 even when it places no task (capacity/throttle land in .failures),
          # so check explicitly — this is what makes a green run mean "the task launched".
          task_arn=$(echo "$run" | jq -r '.tasks[0].taskArn // empty')
          if [ -z "$task_arn" ]; then
            echo "::error::run-task launched no task: $(echo "$run" | jq -c '.failures')"
            exit 1
          fi

          echo "Launched $task_arn"
          echo "Fire-and-forget: the sweep runs on ECS (it can take several minutes); its result —"
          echo "\"$SYNC_SLICE sync done: refreshed=… failed=…\" — lands in the task's CloudWatch logs."
