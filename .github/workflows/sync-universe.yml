name: Sync universe
run-name: Sync universe

# Weekly (and on-demand). The searchable universe is every US company at/above a $1B market
# cap (~2,800 names). Membership drifts slowly — a company crossing $1B is a rare event — so
# weekly is plenty. It POSTs the deployed app's universe cron endpoint
# (app/stocks/endpoints/cron_universe_endpoints.py), which runs the SyncUniverse use case:
# screen the US market via yfinance (Yahoo) and upsert the result straight onto the stocks
# anchor (additive — present stocks are inserted/refreshed, none are removed), then enrich the
# still-unclassified stocks' sector/industry via a per-ticker Yahoo .info call.
#
# The endpoint is FIRE-AND-FORGET: the enrichment pass makes hundreds-to-thousands of
# sequential Yahoo calls (minutes), well past API Gateway's hard 30s integration timeout, so
# the endpoint schedules the sweep on a background thread and returns 202 immediately. This
# workflow therefore makes a SINGLE quick POST — no batching loop. A 200 "already_running"
# means a previous sweep is still in flight — also success; this run just declines to start a
# second.
#
# Operational notes:
#  - Because the sweep runs in the background, the response can't report how many stocks were
#    screened/enriched — it only confirms the sweep was accepted. The counts land in the app
#    logs (CloudWatch): "universe sync done: screened=… added=… updated=… enriched=… …".
#  - The source is yfinance (Yahoo), which needs no API key but may block data-centre IPs. A
#    blocked bulk screen is skipped server-side (nothing written, both passes skipped); a
#    blocked per-ticker .info just leaves that stock unclassified for the next run. industry is
#    fill-once, so successive weekly runs converge — each run only classifies what's still
#    unset, capped by ENRICH_LIMIT.
#  - The endpoint is currently unauthenticated (an auth-token guard is planned); this workflow
#    just triggers it.
#
# Requires the repo/environment variable API_BASE_URL — the deployed app's base URL,
# reachable from the GitHub runner.

on:
  workflow_dispatch: {}
  # Weekly, Sundays 06:00 UTC — staggered off the daily recommendations sync (07:30) and the
  # Monday earnings syncs (08:00/09:00). Exact timing doesn't matter, so GitHub delaying
  # scheduled runs under load is fine. Caveats: scheduled workflows run only from the default
  # branch, and GitHub auto-disables the schedule after 60 days with no repo activity.
  schedule:
    - cron: "0 6 * * 0"

concurrency:
  group: sync-universe
  cancel-in-progress: false

env:
  # Max stocks the enrichment pass classifies this run, via a per-ticker Yahoo call (the
  # endpoint's ceiling). The bulk screen always runs in full; only enrichment is capped. Since
  # industry is fill-once, a universe larger than this is classified over successive weekly
  # runs — each touches only the still-unclassified.
  SYNC_UNIVERSE_ENRICH_LIMIT: "1000"

jobs:
  sync:
    name: Sync universe
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger the universe refresh
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          set -euo pipefail

          if [ -z "${API_BASE_URL:-}" ]; then
            echo "::error::API_BASE_URL is not set — add it as a repo/environment variable pointing at the deployed app."
            exit 1
          fi

          url="${API_BASE_URL%/}/internal/universe/sync?limit=${SYNC_UNIVERSE_ENRICH_LIMIT}"
          http_code=$(curl -sS -X POST "$url" \
            --max-time 30 \
            -o /tmp/universe_sync.json \
            -w '%{http_code}')
          body=$(cat /tmp/universe_sync.json 2>/dev/null || echo '{}')
          echo "POST ${url} -> HTTP ${http_code}: ${body}"

          # 202 = sweep started; 200 = a sweep was already running (also fine). Anything
          # else is a real failure (the app is down, or the trigger was rejected).
          if [ "$http_code" != "202" ] && [ "$http_code" != "200" ]; then
            echo "::error::Universe sync trigger failed (HTTP $http_code) — check the app logs."
            exit 1
          fi

          echo "Universe sweep triggered ($(echo "$body" | jq -r '.status // "?"'))."
