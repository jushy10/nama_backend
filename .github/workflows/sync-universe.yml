name: Sync universe
run-name: Sync universe

# Daily (and on-demand). The searchable universe is every US company at/above a $1B market cap
# (~2,800 names). Membership itself drifts slowly — a company crossing $1B is rare — but the
# screen also refreshes the *price-derived* facts on the anchor (market_cap and the trailing
# pe_ratio the search sorts on), which we want tracking the market rather than a week stale. Daily
# is cheap here: the bulk screen is a handful of Yahoo calls, the valuation pass is DB-only, and
# the per-ticker enrichment is fill-once — at steady state it only re-touches the small tail Yahoo
# can't classify, so daily doesn't meaningfully raise Yahoo load once the universe is seeded.
#
# It launches a one-off ECS Fargate task that runs `python -m app.sync universe 1000` (the
# SyncUniverse use case) to completion and exits. The use case screens the US market via yfinance
# (Yahoo) and upserts the result onto the stocks anchor (additive — present stocks are
# inserted/refreshed, none removed), then enriches up to `limit` still-unclassified stocks'
# sector/industry via a per-ticker Yahoo `.info` call (the bulk screen carries neither). The
# sweep runs on its OWN 1 GB task definition (nama-dev-sync), OFF the always-on API task — it's
# the heaviest sweep (the ~2,800-row screen held in memory, plus the enrichment pass), the one
# most likely to OOM the small 512 MB service, which is the whole reason it now runs as a
# separate task instead of POSTing /internal/universe/sync. The task reaches the private RDS by
# borrowing the app service's own network config.
#
# The market screen always runs in full; only the per-ticker enrichment is capped (SYNC_LIMIT).
# Since industry is fill-once, successive runs converge — each classifies only what's still
# unset, up to the cap — so the daily cadence doesn't re-do finished classification work.
#
# FIRE-AND-FORGET: this workflow LAUNCHES the task and returns; the sweep then runs on ECS (the
# enrichment pass makes hundreds-to-thousands of sequential Yahoo calls — minutes) and its result
# — "universe sync done: screened=… added=… updated=… enriched=… enrich_failed=… limit=…" —
# lands in the task's CloudWatch logs, not here. A green run means the task launched; check
# CloudWatch for the outcome. An empty or implausibly small screen (a Yahoo block) is skipped
# inside the sync, so nothing is written and the stored (additive) universe stays put.
#
# Manual run: Actions → "Sync universe" → Run workflow (same trigger, off-schedule).
#
# Auth: the AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY secrets + AWS_REGION var — the same
# identity the deploy + migrate jobs already use to run one-off ECS tasks.

on:
  workflow_dispatch: {}
  # Daily, 06:00 UTC — before US market open, so each run prices off the prior day's close (the
  # standard daily-P/E basis) and lands ahead of the daily recommendations sync (07:30) and the
  # Monday earnings syncs (08:00/09:00). Exact timing doesn't matter. Caveats: scheduled
  # workflows run only from the default branch, and GitHub auto-disables the schedule after 60
  # days with no repo activity.
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: sync-universe
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  # These match module "app" { name = "nama-dev" } in infra/environments/dev; the sync task
  # def is that name + "-sync" (aws_ecs_task_definition.sync in the ecs-fargate-service module).
  ECS_CLUSTER: nama-dev
  ECS_SERVICE: nama-dev
  SYNC_TASK_DEF: nama-dev-sync
  SYNC_SLICE: universe
  # Max stocks the enrichment pass classifies this run, via a per-ticker Yahoo call. The bulk
  # screen always runs in full; only enrichment is capped. Since industry is fill-once, a
  # universe larger than this is classified over successive runs.
  SYNC_LIMIT: "1000"

jobs:
  sync:
    name: Sync universe
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Launch the sync task
        run: |
          set -euo pipefail

          # The sync task runs INSIDE the VPC (the private RDS is unreachable from the runner).
          # Borrow the app service's own network config — subnets + security groups, including
          # the DB SG — so there's nothing to hardcode. Same approach the migrate job uses.
          status=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$status" != "ACTIVE" ]; then
            echo "::error::ECS service '$ECS_SERVICE' is not ACTIVE (status: $status) — deploy the app first."
            exit 1
          fi
          netcfg=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].networkConfiguration' --output json)

          # Container command override: python -m app.sync universe <enrich-limit>.
          overrides=$(jq -cn --arg slice "$SYNC_SLICE" --arg limit "${SYNC_LIMIT:-}" '
            {containerOverrides: [{
              name: "app",
              command: (["python", "-m", "app.sync", $slice] + (if $limit == "" then [] else [$limit] end))
            }]}')

          echo "Launching one-off sync task: app.sync $SYNC_SLICE $SYNC_LIMIT"
          run=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$SYNC_TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "$netcfg" \
            --started-by "gha-sync-${GITHUB_SHA::7}" \
            --overrides "$overrides")

          # run-task exits 0 even when it places no task (capacity/throttle land in .failures),
          # so check explicitly — this is what makes a green run mean "the task launched".
          task_arn=$(echo "$run" | jq -r '.tasks[0].taskArn // empty')
          if [ -z "$task_arn" ]; then
            echo "::error::run-task launched no task: $(echo "$run" | jq -c '.failures')"
            exit 1
          fi

          echo "Launched $task_arn"
          echo "Fire-and-forget: the sweep runs on ECS (the enrichment pass takes minutes); its result —"
          echo "\"universe sync done: screened=… added=… updated=… enriched=… enrich_failed=… limit=…\" — lands in CloudWatch."
