name: Infrastructure
run-name: Infrastructure · ${{ (github.event_name == 'pull_request') && 'plan' || 'apply' }} · ${{ github.ref_name }}

# Terraform for every environment under infra/environments/.
#   - Pull requests touching infra/**  -> terraform plan  (preview only)
#   - Push to main                     -> terraform apply
#
# Add an environment by creating infra/environments/<name>/ and adding <name>
# to the matrix below.
#
# Auth: AWS access keys in repo SECRETS (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY).
# Variables: TF_STATE_BUCKET (required, the S3 state bucket), AWS_REGION (optional).
# OIDC is the more secure upgrade — see infra/README.md.

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    name: ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev]
    defaults:
      run:
        working-directory: infra/environments/${{ matrix.environment }}
    permissions:
      contents: read
    env:
      # Keep the Terraform provider region in sync with the SDK region.
      TF_VAR_region: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Terraform init
        run: terraform init -input=false -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform plan
        run: terraform plan -input=false -no-color

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false -no-color
