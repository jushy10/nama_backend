name: app-image

# Build the app's Docker image, push it to ECR, and roll the ECS service.
# Runs on pushes to main that touch the app or Dockerfile, or on demand.
#
# Requires the infra to exist first (the ECR repo + ECS service are created by
# the `infra` workflow). Auth uses the same AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
# secrets and the AWS_REGION variable.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/app-image.yml"
  workflow_dispatch: {}

concurrency:
  group: app-image
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  # These match module "app" { name = "nama-dev" } in environments/dev.
  ECR_REPOSITORY: nama-dev
  ECS_CLUSTER: nama-dev
  ECS_SERVICE: nama-dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_REPOSITORY:latest" \
            -t "$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}" .
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"

      - name: Roll the ECS service onto the new image
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment
