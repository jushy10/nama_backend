name: terraform

# Infra checks. Runs only when infra/** changes.
#
# Two jobs, by design:
#   - validate: always runs, needs NO AWS credentials. This is the real PR gate
#     (formatting + provider init + config validation).
#   - plan: opt-in. Runs only once you set the `AWS_ROLE_ARN` repository
#     *variable* (an OIDC role Terraform can assume — no long-lived AWS keys).
on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: infra

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      # Formatting check. Non-blocking for now because the formatter hasn't been
      # run locally yet — run `terraform fmt -recursive` and commit, then flip
      # continue-on-error to false to make this a hard gate.
      - name: Format check
        continue-on-error: true
        run: terraform fmt -check -recursive -diff

      # -backend=false downloads providers without needing the S3 backend or
      # any AWS credentials, so validation works on every PR.
      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  plan:
    needs: validate
    runs-on: ubuntu-latest
    # Skips entirely until you create the AWS_ROLE_ARN repo variable.
    if: ${{ vars.AWS_ROLE_ARN != '' }}
    permissions:
      contents: read
      id-token: write # required for AWS OIDC
    env:
      # Required inputs have no defaults — supply them as repo variables.
      # db_subnet_ids / allowed_app_security_group_ids are lists: use JSON,
      # e.g. ["subnet-aaa","subnet-bbb"]
      TF_VAR_vpc_id: ${{ vars.TF_VAR_VPC_ID }}
      TF_VAR_db_subnet_ids: ${{ vars.TF_VAR_DB_SUBNET_IDS }}
      TF_VAR_allowed_app_security_group_ids: ${{ vars.TF_VAR_ALLOWED_APP_SECURITY_GROUP_IDS }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Init
        run: terraform init

      - name: Plan
        run: terraform plan -input=false -no-color
