name: Sync annual earnings
run-name: Sync annual earnings

# Monthly (and on-demand). Reported fiscal years — and the trailing YoY growth derived from
# them onto the stocks anchor — change about once a year per stock. The sweep both keeps the
# already-stored rows fresh and SEEDS stocks not yet cached (the ≥$1B universe), un-cached
# first. It POSTs the deployed app's annual-earnings cron endpoint
# (app/stocks/endpoints/cron_annual_earnings_endpoints.py), which runs the SyncAnnualEarnings
# use case.
#
# The endpoint is FIRE-AND-FORGET: it schedules the sweep on a background thread and returns
# 202 immediately, so this workflow makes a SINGLE quick POST — no batching. By default the
# sweep processes EVERY stock in the anchor (un-cached first, then stalest); pass the optional
# `limit` dispatch input to cap a single run (e.g. to chunk the first seed and stay gentle on
# Yahoo). A 200 "already_running" means a previous sweep is still in flight — also success;
# this run just declines to start a second.
#
# Operational notes:
#  - Because the sweep runs in the background, the response can't report how many stocks were
#    refreshed — it only confirms the sweep was accepted. The counts land in the app logs
#    (CloudWatch): "annual-earnings sync done: refreshed=… failed=…".
#  - The live source is yfinance (Yahoo), which needs no API key. Yahoo rate-limits / blocks
#    data-centre IPs intermittently, so a sweep may refresh fewer stocks than requested; the
#    next run retries the stalest first. A degraded fetch can't erase stored figures: the
#    sync merges the fresh window with the stored rows (reported history and revenue are
#    carried forward when Yahoo drops them), and an empty result is never stored.
#  - An unbounded run makes one round of Yahoo calls per stock (thousands, sequential); if
#    Yahoo starts blocking, pass `limit` to cover the universe over several smaller runs.
#  - The endpoint is currently unauthenticated (an auth-token guard is planned); this
#    workflow just triggers it.
#
# Requires the repo/environment variable API_BASE_URL — the deployed app's base URL,
# reachable from the GitHub runner.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional cap on stocks to refresh this run (un-cached first, then stalest). Leave blank to process every stock."
        required: false
        type: string
        default: ""
  # 1st of each month, 09:00 UTC — an hour after the quarterly-earnings sync so the two don't
  # hit Yahoo from the same host at once on a month whose 1st is a Monday. The stored annual
  # rows (reported years + the trailing YoY growth) change about once a year per stock, so a
  # monthly refresh keeps them current; exact timing doesn't matter, so GitHub delaying
  # scheduled runs under load is fine. Caveats: scheduled workflows run only from the default
  # branch, and GitHub auto-disables the schedule after 60 days with no repo activity.
  schedule:
    - cron: "0 9 1 * *"

concurrency:
  group: sync-annual-earnings
  cancel-in-progress: false

jobs:
  sync:
    name: Sync annual earnings
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger the annual-earnings refresh
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          # Optional per-dispatch cap; empty on scheduled runs (and by default), so the
          # endpoint processes every stock.
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          set -euo pipefail

          if [ -z "${API_BASE_URL:-}" ]; then
            echo "::error::API_BASE_URL is not set — add it as a repo/environment variable pointing at the deployed app."
            exit 1
          fi

          url="${API_BASE_URL%/}/internal/earnings/annual/sync"
          # Append ?limit= only when a limit was provided (manual dispatch); otherwise the
          # endpoint refreshes + seeds every stock (its default).
          if [ -n "${LIMIT:-}" ]; then
            url="${url}?limit=${LIMIT}"
          fi
          http_code=$(curl -sS -X POST "$url" \
            --max-time 30 \
            -o /tmp/sync_response.json \
            -w '%{http_code}')
          body=$(cat /tmp/sync_response.json 2>/dev/null || echo '{}')
          echo "POST ${url} -> HTTP ${http_code}: ${body}"

          # 202 = sweep started; 200 = a sweep was already running (also fine). Anything
          # else is a real failure (the app is down, or the trigger was rejected).
          if [ "$http_code" != "202" ] && [ "$http_code" != "200" ]; then
            echo "::error::Annual-earnings sync trigger failed (HTTP $http_code) — check the app logs."
            exit 1
          fi

          echo "Annual-earnings sweep triggered ($(echo "$body" | jq -r '.status // "?"'))."
