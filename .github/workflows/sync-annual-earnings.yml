name: Sync annual earnings
run-name: Sync annual earnings

# Monthly (and on-demand). Reported fiscal years — and the trailing YoY growth derived from
# them onto the stocks anchor — change about once a year per stock. The sweep both keeps the
# already-stored rows fresh and SEEDS stocks not yet cached (the ≥$1B universe), un-cached first.
#
# It launches a one-off ECS Fargate task that runs `python -m app.sync annual-earnings [limit]`
# (the SyncAnnualEarnings use case) to completion and exits. The sweep runs on its OWN 1 GB task
# definition (nama-dev-sync), OFF the always-on API task, so it can't OOM the small service —
# this replaced POSTing the app's /internal/earnings/annual/sync endpoint. The task reaches the
# private RDS by borrowing the app service's own network config.
#
# By default the sweep processes EVERY stock in the anchor (un-cached first, then stalest); use
# the optional `limit` dispatch input to cap a single run (e.g. to chunk the first seed and stay
# gentle on Yahoo).
#
# FIRE-AND-FORGET: this workflow LAUNCHES the task and returns; the sweep then runs in the
# background on ECS (it can take several minutes) and its result — "annual-earnings sync done:
# refreshed=… failed=…" — lands in the task's CloudWatch logs, not here. A green run means the
# task launched; check CloudWatch for the outcome. yfinance (Yahoo) needs no API key but blocks
# data-centre IPs intermittently; a degraded fetch can't erase stored figures (the sync merges
# the fresh window with stored rows — reported history and revenue carried forward) and an empty
# result is never stored.
#
# Manual run: Actions → "Sync annual earnings" → Run workflow (same trigger, off-schedule).
#
# Auth: the AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY secrets + AWS_REGION var — the same
# identity the deploy + migrate jobs already use to run one-off ECS tasks.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional cap on stocks to refresh this run (un-cached first, then stalest). Leave blank to process every stock."
        required: false
        type: string
        default: ""
  # 1st of each month, 09:00 UTC — an hour after the quarterly-earnings sync so the two don't
  # hit Yahoo from the same host at once on a month whose 1st is a Monday. The stored annual rows
  # change about once a year per stock, so a monthly refresh keeps them current; exact timing
  # doesn't matter. Caveats: scheduled workflows run only from the default branch, and GitHub
  # auto-disables the schedule after 60 days with no repo activity.
  schedule:
    - cron: "0 9 1 * *"

concurrency:
  group: sync-annual-earnings
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  # These match module "app" { name = "nama-dev" } in infra/environments/dev; the sync task
  # def is that name + "-sync" (aws_ecs_task_definition.sync in the ecs-fargate-service module).
  ECS_CLUSTER: nama-dev
  ECS_SERVICE: nama-dev
  SYNC_TASK_DEF: nama-dev-sync
  SYNC_SLICE: annual-earnings
  # Minimum spacing (ms) between the sweep's Yahoo calls, injected as
  # YF_MIN_REQUEST_INTERVAL_MS on the one-off task (read by yfinance_session._pace). Bursting
  # unspaced calls trips Yahoo's hard "unable to access this feature" IP gate mid-sweep (seen
  # on the ETF sync); pacing holds the rate under it — which matters doubly here, since the
  # sweep leans on income_stmt, the endpoint Yahoo gates hardest. A full sweep is ~4-5 Yahoo
  # reads per stock (~13k calls) → ~3h at 750ms, fine for a monthly fire-and-forget task. Same
  # knob as the other Yahoo syncs.
  YF_PACE_MS: "750"

jobs:
  sync:
    name: Sync annual earnings
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Launch the sync task
        env:
          # Optional per-dispatch cap; empty on scheduled runs (and by default), so the sweep
          # processes every stock.
          SYNC_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          set -euo pipefail

          # The sync task runs INSIDE the VPC (the private RDS is unreachable from the runner).
          # Borrow the app service's own network config — subnets + security groups, including
          # the DB SG — so there's nothing to hardcode. Same approach the migrate job uses.
          status=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$status" != "ACTIVE" ]; then
            echo "::error::ECS service '$ECS_SERVICE' is not ACTIVE (status: $status) — deploy the app first."
            exit 1
          fi
          netcfg=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].networkConfiguration' --output json)

          # Container override: python -m app.sync <slice> [limit] (an empty limit — scheduled
          # runs — omits the arg, so the sweep processes every stock), plus
          # YF_MIN_REQUEST_INTERVAL_MS so the sweep paces its Yahoo calls (see YF_PACE_MS above).
          overrides=$(jq -cn --arg slice "$SYNC_SLICE" --arg limit "${SYNC_LIMIT:-}" --arg pace "$YF_PACE_MS" '
            {containerOverrides: [{
              name: "app",
              command: (["python", "-m", "app.sync", $slice] + (if $limit == "" then [] else [$limit] end)),
              environment: [{name: "YF_MIN_REQUEST_INTERVAL_MS", value: $pace}]
            }]}')

          echo "Launching one-off sync task: app.sync $SYNC_SLICE ${SYNC_LIMIT:-(no limit)}"
          run=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$SYNC_TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "$netcfg" \
            --started-by "gha-sync-${GITHUB_SHA::7}" \
            --overrides "$overrides")

          # run-task exits 0 even when it places no task (capacity/throttle land in .failures),
          # so check explicitly — this is what makes a green run mean "the task launched".
          task_arn=$(echo "$run" | jq -r '.tasks[0].taskArn // empty')
          if [ -z "$task_arn" ]; then
            echo "::error::run-task launched no task: $(echo "$run" | jq -c '.failures')"
            exit 1
          fi

          echo "Launched $task_arn"
          echo "Fire-and-forget: the sweep runs on ECS (it can take several minutes); its result —"
          echo "\"$SYNC_SLICE sync done: refreshed=… failed=…\" — lands in the task's CloudWatch logs."
