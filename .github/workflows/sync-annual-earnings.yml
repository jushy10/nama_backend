name: Sync annual earnings
run-name: Sync annual earnings

# Weekly (and on-demand). Reported fiscal years and forward-year estimates change through the
# year, so this keeps the stored rows fresh — and fills coverage: the endpoint seeds by
# default, fetching index constituents with nothing stored yet (the growth screener reads
# only what's stored) ahead of the staleness queue. It POSTs the deployed app's
# annual-earnings cron endpoint (app/stocks/endpoints/cron_annual_earnings_endpoints.py),
# which runs the SyncAnnualEarnings use case: never-stored constituents first, then the
# stalest stored stocks.
#
# The refresh runs in SMALL BATCHES rather than one big call: the endpoint is synchronous and
# the ALB in front of the app has a ~60s idle timeout, so a hundreds-of-symbols request would
# 504 at the load balancer while the app kept working. Each batch refreshes a few stocks
# (well under the timeout); refreshed stocks get a new fetch stamp, so consecutive
# stalest-first batches naturally walk the whole stored set. The loop stops early when a
# batch refreshes nothing (Yahoo blocking the runs) or comes back smaller than requested
# (stored set exhausted).
#
# Operational notes:
#  - The live source is yfinance (Yahoo), which needs no API key. Yahoo rate-limits / blocks
#    data-centre IPs intermittently, so a run may refresh fewer stocks than the limit; the
#    next run retries the stalest first. A degraded fetch can't erase stored figures: the
#    sync merges the fresh window with the stored rows (reported history and revenue are
#    carried forward when Yahoo drops them), and an empty result is never stored.
#  - The endpoint is currently unauthenticated (an auth-token guard is planned); this
#    workflow just triggers it.
#
# Requires the repo/environment variable API_BASE_URL — the deployed app's base URL,
# reachable from the GitHub runner.

on:
  workflow_dispatch: {}
  # Mondays, 09:00 UTC — an hour after the quarterly-earnings sync, so the two don't hit Yahoo
  # from the same host at once. Weekly keeps forward estimates and freshly-reported years
  # current; exact timing doesn't matter, so GitHub delaying scheduled runs under load is fine.
  # Caveats: scheduled workflows run only from the default branch, and GitHub auto-disables the
  # schedule after 60 days with no repo activity.
  schedule:
    - cron: "0 9 * * 1"

concurrency:
  group: sync-annual-earnings
  cancel-in-progress: false

env:
  # Max stored stocks to refresh per run, and how many per HTTP call. Each batch must finish
  # inside the ALB's ~60s idle timeout (a stock is ~4 sequential Yahoo calls), so keep the
  # batch small; the loop covers the rest.
  SYNC_ANNUAL_EARNINGS_LIMIT: "200"
  SYNC_ANNUAL_EARNINGS_BATCH: "10"

jobs:
  sync:
    name: Sync annual earnings
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger the annual-earnings refresh (batched)
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          set -euo pipefail

          if [ -z "${API_BASE_URL:-}" ]; then
            echo "::error::API_BASE_URL is not set — add it as a repo/environment variable pointing at the deployed app."
            exit 1
          fi

          total="${SYNC_ANNUAL_EARNINGS_LIMIT}"
          batch="${SYNC_ANNUAL_EARNINGS_BATCH}"
          url="${API_BASE_URL%/}/internal/earnings/annual/sync?limit=${batch}"
          refreshed_total=0
          failed_total=0
          done_count=0

          while [ "$done_count" -lt "$total" ]; do
            http_code=$(curl -sS -X POST "$url" \
              --max-time 120 \
              -o /tmp/sync_response.json \
              -w '%{http_code}')
            body=$(cat /tmp/sync_response.json 2>/dev/null || echo '{}')
            echo "POST limit=${batch} -> HTTP ${http_code}: ${body}"

            if [ "$http_code" != "200" ]; then
              echo "::error::Annual-earnings sync batch failed (HTTP $http_code) — check the app logs."
              exit 1
            fi

            refreshed=$(echo "$body" | jq -r '.refreshed // 0')
            failed=$(echo "$body" | jq -r '.failed // 0')
            refreshed_total=$((refreshed_total + refreshed))
            failed_total=$((failed_total + failed))
            done_count=$((done_count + refreshed + failed))

            # Nothing refreshed: either no stored stocks or Yahoo is blocking every fetch —
            # more batches won't help this run.
            if [ "$refreshed" -eq 0 ]; then
              echo "No stocks refreshed in this batch — stopping early."
              break
            fi
            # A short batch means the stored set is smaller than the request — done.
            if [ $((refreshed + failed)) -lt "$batch" ]; then
              echo "Stored set exhausted — stopping."
              break
            fi
          done

          echo "Annual earnings synced: refreshed=${refreshed_total} failed=${failed_total}."
          if [ "$refreshed_total" -eq 0 ] && [ "$failed_total" -gt 0 ]; then
            echo "::error::Every attempted stock failed this run (Yahoo blocked?) — stored rows keep serving; the next run retries."
            exit 1
          fi
